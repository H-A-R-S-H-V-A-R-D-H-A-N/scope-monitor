name: scope-monitor

on:
  schedule:
    # bounty-targets-data itself only updates every ~30 min, so polling
    # faster than this just re-checks the same data.
    - cron: "*/30 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write # needed to commit state.json back

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run scope monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: go run .

      - name: Commit updated state
        run: |
          git config user.name "scope-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet && echo "no state change" || git commit -m "chore: update scope snapshot [skip ci]"
          git push
